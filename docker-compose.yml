version: '3.8'

services:
  productapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: productapi          
    ports:
      - "5197:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/products.db
    volumes:
      - product-data:/app/data         
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/products"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  product-data:
    driver: local